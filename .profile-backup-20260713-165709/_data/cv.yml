    Research Experience:
      - company: China Mobile, Digital Intelligence Department
        position: AI Agent Algorithm Intern
        location: China
        start_date: 2026-01
        end_date: 2026-03
        summary: Research on memory mechanisms for long-horizon AI-agent interaction.
        highlights:
          - Investigated RAG retrieval, hierarchical storage, self-evolving memory, compression, forgetting, and updating mechanisms.
          - Reproduced and analyzed the Mem-α architecture and modeled memory updates as a policy-optimization problem.
          - Explored memory-aware scheduling across device, edge, and cloud resources.
      - company: National Key R&D Program of China
        position: Primary Researcher — Knowledge-Aware RAG Service Scheduling
        start_date: 2025-10
        end_date: 2026-06
        highlights:
          - Jointly modeled knowledge matching, computation cost, communication conditions, and response latency.
          - Designed knowledge-aware orchestration for collaborative cloud-edge RAG inference.
      - company: Institute of Computing Technology, Chinese Academy of Sciences
        position: Primary Researcher — Memory-Aware Routing in Space AI Computing Networks
        start_date: 2025-10
        end_date: 2026-03
        highlights:
          - Modeled dynamic topology, onboard storage fluctuation, heterogeneous computing, and task routing.
          - Developed diffusion-based distributed routing and reduced end-to-end delay by more than 15% in experiments.
      - company: National Key R&D Program of China
        position: Primary Researcher — Distributed Quantum RL for AIGC Scheduling
        start_date: 2025-06
        end_date: 2025-12
        highlights:
          - Designed a distributed hybrid quantum-classical reinforcement-learning framework.
          - Reduced policy-network parameters by more than 95% and average service delay by more than 30% in simulation.
      - company: National Key R&D Program of China
        position: Primary Researcher — ISAC-Driven AIGC Resource Allocation
        start_date: 2024-01
        end_date: 2025-06
        highlights:
          - Built a joint sensing, communication, and computing resource model for AIGC services.
          - Developed an LP-guided hierarchical reinforcement-learning framework and improved average user experience by more than 50%.
      - company: National Key R&D Program of China
        position: Primary Researcher — High-Concurrency AI Service Optimization
        start_date: 2022-12
        end_date: 2024-12
        highlights:
          - Jointly optimized user selection, channels, power, bandwidth, and edge-computing resources.
          - Improved average service satisfaction by more than 50% in resource-constrained scenarios.
      - company: Ministerial Fundamental Strengthening Project
        position: Technical Lead — Full-Duplex Ad Hoc Networks
        start_date: 2022-10
        end_date: 2023-06
        highlights:
          - Designed multi-channel interference coordination and MAC-layer access mechanisms.
          - Built a system-level simulation platform and produced an authorized invention patent and software copyright.
      - company: CAS Young Scientists Project and Ministerial Key Project
        position: Task Lead and Technical Lead — UAV-Assisted Secure Communications
        start_date: 2021-09
        end_date: 2023-06
        highlights:
          - Jointly optimized beamforming, UAV three-dimensional position, and power allocation for secure mmWave MIMO communications.

