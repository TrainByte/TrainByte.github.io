    Internship:
      - company: China Mobile, Digital Intelligence Department
        position: AI Agent Algorithm Intern
        location: China
        start_date: 2026-01
        end_date: 2026-03
        summary: Research on memory mechanisms for long-horizon, multi-turn AI-agent interaction.
        highlights:
          - Surveyed RAG retrieval, hierarchical memory storage, self-evolving memory, compression, forgetting, and dynamic updating.
          - Reproduced and analyzed the Mem-α architecture and formulated memory selection, compression, and updates as a policy-optimization problem.
          - Explored memory-aware large-model task scheduling across device, edge, and cloud resources.

    Research Experience:
      - company: National Key R&D Program of China
        position: Primary Researcher — Knowledge-Aware RAG Service Scheduling
        start_date: 2025-10
        end_date: 2026-06
        highlights:
          - Jointly modeled task semantics, knowledge coverage, computing cost, transmission delay, and energy consumption across cloud-edge nodes.
          - Designed knowledge-matching-aware orchestration for collaborative RAG inference.
          - Reduced energy consumption by approximately 50% and service delay by more than 10% in simulation.
      - company: Institute of Computing Technology, Chinese Academy of Sciences
        position: Primary Researcher — Memory-Aware Routing in Space AI Computing Networks
        start_date: 2025-10
        end_date: 2026-03
        highlights:
          - Modeled task routing, memory resources, computing loads, and dynamic link states in satellite computing networks.
          - Developed diffusion-assisted distributed routing for high-dimensional dynamic state spaces.
          - Reduced end-to-end routing delay by more than 15% in a ground-based space-computing test environment.
      - company: National Key R&D Program of China
        position: Primary Researcher — Distributed Quantum RL for AIGC Scheduling
        start_date: 2025-06
        end_date: 2025-12
        highlights:
          - Designed a distributed hybrid quantum-classical reinforcement-learning framework for cloud-edge AIGC services.
          - Reduced policy-network parameters by more than 95% and average service delay by more than 30% in simulation.
      - company: National Key R&D Program of China
        position: Primary Researcher — ISAC-Driven AIGC Resource Allocation
        start_date: 2024-01
        end_date: 2025-06
        highlights:
          - Built a joint sensing, communication, and computing resource model for AIGC services.
          - Developed an LP-guided hierarchical reinforcement-learning framework.
          - Improved average service experience by more than 50% over schemes that focus only on content-generation quality.
      - company: National Key R&D Program of China
        position: Primary Researcher — High-Concurrency AI Service Optimization
        start_date: 2022-12
        end_date: 2024-12
        highlights:
          - Jointly optimized user selection, channels, power, bandwidth, and edge-computing resources in multi-cell MEC networks.
          - Improved average service satisfaction by more than 50% in resource-constrained scenarios.
      - company: National Key R&D Program of China
        position: Primary Researcher — Long-Term Fair Wireless Resource Scheduling
        start_date: 2022-05
        end_date: 2024-05
        highlights:
          - Modeled robust resource allocation under imperfect channel-state information.
          - Designed a reward-adaptive multi-agent reinforcement-learning framework.
          - Improved long-term fairness by 13% while increasing network service rate by more than 10%.
      - company: Ministerial Fundamental Strengthening Project
        position: Technical Lead — Full-Duplex Ad Hoc Networks
        start_date: 2022-10
        end_date: 2023-06
        highlights:
          - Designed multi-channel interference coordination and MAC-layer access mechanisms for in-band full-duplex ad hoc networks.
          - Built a system-level simulation platform and produced an authorized invention patent and software copyright.
      - company: CAS Young Scientists Project and Ministerial Key Project
        position: Task Lead and Technical Lead — UAV-Assisted Secure Communications
        start_date: 2021-09
        end_date: 2023-06
        highlights:
          - Jointly optimized beamforming, UAV three-dimensional position, and power allocation for secure mmWave MIMO communications.
          - Improved secure transmission rate to approximately twice that of the no-deception baseline.

