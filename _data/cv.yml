    Internship:
      - company: China Mobile, Digital Intelligence Department
        position: AI Agent Algorithm Intern
        location: China
        start_date: 2026-01
        end_date: 2026-03
        summary: Conducted research on long-horizon memory mechanisms for AI agents.
        highlights:
          - Studied retrieval-augmented memory, hierarchical storage, memory compression, forgetting, and dynamic updating.
          - Reproduced and analyzed the Mem-alpha architecture and modeled memory maintenance as a policy optimization problem.
          - Investigated memory-aware task scheduling in cloud-edge collaborative systems.

    Research Experience:
      - company: Institute of Computing Technology, Chinese Academy of Sciences
        position: Lead Researcher, Service Satisfaction-Aware MEC Resource Allocation
        start_date: 2022-12
        end_date: 2024-12
        highlights:
          - Jointly optimized user selection, subchannel scheduling, power allocation, and edge-computing resources in NOMA-based multi-cell MEC networks.
          - Achieved a gap of less than 1% from exhaustive-search performance and improved average user service satisfaction by more than 50%.
      - company: Institute of Computing Technology, Chinese Academy of Sciences
        position: Lead Researcher, ISAC-Driven AIGC Resource Allocation
        start_date: 2024-01
        end_date: 2025-06
        highlights:
          - Built a content-accuracy-and-quality-aware model for sensing, computing, and communication resource allocation in ISAC-driven AIGC networks.
          - Designed an LP-guided deep reinforcement learning framework.
          - Improved the content-accuracy-and-quality-aware metric by more than 10% over learning baselines and by more than 50% over generation-quality-only schemes.
      - company: Institute of Computing Technology, Chinese Academy of Sciences
        position: Lead Researcher, Long-Term Fairness-Aware Wireless Scheduling
        start_date: 2022-05
        end_date: 2024-05
        highlights:
          - Modeled imperfect channel-state information and long-term alpha-fair utility for wireless communication systems.
          - Designed a reward-adaptive multi-agent reinforcement-learning framework.
          - Improved long-term fairness by more than 13% while increasing the overall service rate by more than 10%.
      - company: Institute of Computing Technology, Chinese Academy of Sciences
        position: Task Leader and Technical Lead, UAV-Assisted Secure Communications
        start_date: 2021-09
        end_date: 2023-06
        highlights:
          - Jointly optimized UAV positioning, mmWave MIMO beamforming, deceptive signal design, and power allocation.
          - Achieved a performance gap of no more than 3% from the global optimum, improved secure transmission rate by more than 9% over direct-link transmission, and by more than 100% over the no-deception scheme.
      - company: Institute of Computing Technology, Chinese Academy of Sciences
        position: Technical Lead, Full-Duplex Ad Hoc Networks
        start_date: 2022-10
        end_date: 2023-06
        highlights:
          - Designed multi-channel interference coordination and MAC-layer access mechanisms for in-band full-duplex ad hoc networks.
          - Built a system-level simulation platform and produced an authorized invention patent and a registered software copyright.

