<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Distributed full-duplex simulator architecture</title>
  <desc id="desc">A layered architecture diagram for a distributed full-duplex network simulator with a central controller, synchronized worker modules, channel and mobility processing, visualization, and a cross-layer node model.</desc>
  <defs>
    <style>
      :root {
        color-scheme: light dark;
      }
      .canvas {
        fill: #f7fafc;
      }
      .frame {
        fill: #ffffff;
        stroke: #d8e3ec;
        stroke-width: 1.5;
      }
      .section {
        fill: #f2f7fb;
        stroke: #d8e3ec;
        stroke-width: 1.2;
      }
      .module {
        fill: #ffffff;
        stroke: #8ea8c1;
        stroke-width: 2;
      }
      .module-primary {
        fill: #eaf4ff;
        stroke: #4f82bd;
        stroke-width: 2.2;
      }
      .module-accent {
        fill: #edf9f7;
        stroke: #45a5a0;
        stroke-width: 2;
      }
      .chip {
        fill: #eef6ff;
        stroke: #a7c5e7;
        stroke-width: 1.4;
      }
      .title-text {
        fill: #1f2f3f;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 25px;
        font-weight: 700;
      }
      .subtitle-text {
        fill: #52677b;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 15px;
        font-weight: 600;
      }
      .heading-text {
        fill: #203448;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 18px;
        font-weight: 700;
      }
      .body-text {
        fill: #3b5268;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 14px;
        font-weight: 600;
      }
      .label-text {
        fill: #60758a;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 12px;
        font-weight: 600;
      }
      .wire {
        fill: none;
        stroke: #5e8fc3;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow-blue);
      }
      .wire-muted {
        stroke: #8fa7bb;
        stroke-width: 2.4;
        marker-end: url(#arrow-muted);
      }
      .wire-accent {
        stroke: #2faaa3;
        marker-end: url(#arrow-accent);
      }
      .dash {
        stroke-dasharray: 7 7;
      }
      .shadow {
        filter: url(#soft-shadow);
      }
      @media (prefers-color-scheme: dark) {
        .canvas {
          fill: #0f1722;
        }
        .frame {
          fill: #121c2b;
          stroke: #26384d;
        }
        .section {
          fill: #152133;
          stroke: #26384d;
        }
        .module {
          fill: #172337;
          stroke: #6f8ba8;
        }
        .module-primary {
          fill: #173252;
          stroke: #8fc4f6;
        }
        .module-accent {
          fill: #123431;
          stroke: #5ccbc4;
        }
        .chip {
          fill: #14273d;
          stroke: #547ca8;
        }
        .title-text,
        .heading-text {
          fill: #edf5ff;
        }
        .subtitle-text,
        .body-text,
        .label-text {
          fill: #b9cadb;
        }
        .wire {
          stroke: #8fc4f6;
        }
        .wire-muted {
          stroke: #7f96ad;
        }
        .wire-accent {
          stroke: #55cbc3;
        }
      }
    </style>
    <filter id="soft-shadow" x="-15%" y="-20%" width="130%" height="145%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#16324f" flood-opacity="0.13" />
    </filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,5 L0,10 z" fill="#5e8fc3" />
    </marker>
    <marker id="arrow-muted" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,5 L0,10 z" fill="#8fa7bb" />
    </marker>
    <marker id="arrow-accent" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,5 L0,10 z" fill="#2faaa3" />
    </marker>
  </defs>

  <rect class="canvas" width="1200" height="760" rx="28" />
  <rect class="frame" x="34" y="34" width="1132" height="692" rx="24" />

  <text class="title-text" x="600" y="78" text-anchor="middle">Distributed System-Level Full-Duplex Simulator</text>
  <text class="subtitle-text" x="600" y="104" text-anchor="middle">Synchronized slots, distributed execution, channel computation, and cross-layer protocol evaluation</text>

  <rect class="section" x="70" y="126" width="1060" height="154" rx="18" />
  <rect class="module module-primary shadow" x="404" y="154" width="392" height="86" rx="16" />
  <text class="heading-text" x="600" y="188" text-anchor="middle">Central Simulation Controller</text>
  <text class="body-text" x="600" y="214" text-anchor="middle">
    <tspan x="600" dy="0">initialization, slot clock, runtime control,</tspan>
    <tspan x="600" dy="20">result aggregation, and global coordination</tspan>
  </text>

  <rect class="module" x="102" y="166" width="224" height="58" rx="14" />
  <text class="body-text" x="214" y="190" text-anchor="middle">WebSocket</text>
  <text class="label-text" x="214" y="209" text-anchor="middle">coordination channel</text>

  <rect class="module" x="874" y="166" width="224" height="58" rx="14" />
  <text class="body-text" x="986" y="190" text-anchor="middle">Management Console</text>
  <text class="label-text" x="986" y="209" text-anchor="middle">control and inspection</text>

  <path class="wire wire-muted dash" d="M326 195 H404" />
  <path class="wire wire-muted dash" d="M796 195 H874" />
  <text class="label-text" x="600" y="264" text-anchor="middle">time-slot synchronization bus</text>
  <path class="wire" d="M600 240 V300" />

  <rect class="section" x="70" y="300" width="1060" height="182" rx="18" />

  <rect class="module shadow" x="98" y="336" width="236" height="106" rx="15" />
  <text class="heading-text" x="216" y="365" text-anchor="middle">Network Workers</text>
  <text class="body-text" x="216" y="392" text-anchor="middle">
    <tspan x="216" dy="0">distributed node execution</tspan>
    <tspan x="216" dy="20">traffic and protocol logic</tspan>
  </text>

  <rect class="module shadow" x="366" y="336" width="216" height="106" rx="15" />
  <text class="heading-text" x="474" y="365" text-anchor="middle">Channel Engine</text>
  <text class="body-text" x="474" y="392" text-anchor="middle">
    <tspan x="474" dy="0">interference and SINR</tspan>
    <tspan x="474" dy="20">capture-effect decisions</tspan>
  </text>

  <rect class="module shadow" x="618" y="336" width="216" height="106" rx="15" />
  <text class="heading-text" x="726" y="365" text-anchor="middle">Mobility Model</text>
  <text class="body-text" x="726" y="392" text-anchor="middle">
    <tspan x="726" dy="0">node positions</tspan>
    <tspan x="726" dy="20">link dynamics</tspan>
  </text>

  <rect class="module shadow" x="866" y="336" width="236" height="106" rx="15" />
  <text class="heading-text" x="984" y="365" text-anchor="middle">Visualization</text>
  <text class="body-text" x="984" y="392" text-anchor="middle">
    <tspan x="984" dy="0">metrics and logs</tspan>
    <tspan x="984" dy="20">state playback</tspan>
  </text>

  <path class="wire" d="M600 300 H216 V336" />
  <path class="wire" d="M600 300 H474 V336" />
  <path class="wire" d="M600 300 H726 V336" />
  <path class="wire" d="M600 300 H984 V336" />

  <path class="wire wire-muted" d="M334 389 H366" />
  <path class="wire wire-muted" d="M582 389 H618" />
  <path class="wire wire-muted" d="M834 389 H866" />
  <text class="label-text" x="350" y="374" text-anchor="middle">states</text>
  <text class="label-text" x="600" y="374" text-anchor="middle">links</text>
  <text class="label-text" x="850" y="374" text-anchor="middle">events</text>

  <rect class="section" x="70" y="512" width="1060" height="150" rx="18" />
  <rect class="module module-accent shadow" x="100" y="548" width="500" height="86" rx="16" />
  <text class="heading-text" x="350" y="579" text-anchor="middle">Cross-Layer Full-Duplex Node Model</text>
  <text class="body-text" x="350" y="606" text-anchor="middle">
    <tspan x="350" dy="0">application traffic, routing, clustering, MAC access,</tspan>
    <tspan x="350" dy="20">PHY transmission and reception</tspan>
  </text>

  <rect class="module shadow" x="660" y="538" width="420" height="106" rx="16" />
  <text class="heading-text" x="870" y="568" text-anchor="middle">Full-Duplex MAC Factors</text>
  <rect class="chip" x="690" y="590" width="142" height="34" rx="17" />
  <text class="label-text" x="761" y="612" text-anchor="middle">self-interference</text>
  <rect class="chip" x="846" y="590" width="126" height="34" rx="17" />
  <text class="label-text" x="909" y="612" text-anchor="middle">multi-channel</text>
  <rect class="chip" x="986" y="590" width="72" height="34" rx="17" />
  <text class="label-text" x="1022" y="612" text-anchor="middle">priority</text>

  <path class="wire wire-accent" d="M216 442 C216 496 258 526 338 548" />
  <path class="wire wire-muted dash" d="M474 442 C458 494 420 524 372 548" />
  <path class="wire wire-muted dash" d="M984 442 C930 500 856 526 785 538" />
  <path class="wire wire-accent dash" d="M765 590 C690 560 614 512 560 442" />
  <path class="wire wire-accent dash" d="M910 590 C856 535 788 492 726 442" />
  <path class="wire wire-accent dash" d="M1022 590 C1024 536 1006 488 984 442" />
</svg>
